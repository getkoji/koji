# Koji cluster configuration
# See docs/configuration.md for full reference

project: koji-dev

cluster:
  name: default
  base_port: 9400  # dashboard at :9400, server at :9401, services auto-assign from :9410+
  # By default, koji start pulls pre-built images from ghcr.io/getkoji (fast: ~30s).
  # Pin a specific release by setting version: v0.2.0 (default: "latest").
  # version: latest
  # Contributors working on Koji itself can build from local source instead,
  # either by passing `koji start --dev` or by setting dev: true below.
  dev: true

services:
  dashboard: false  # running locally with next dev
  parse: true
  ollama: false

pipeline:
  - step: parse
    engine: docling

  - step: extract
    # Use openai/gpt-4o-mini for quick start (set OPENAI_API_KEY env var)
    # Use ollama models (e.g., llama3.2) for fully local processing
    model: openai/gpt-4o-mini
    schemas:
      - ./schemas/examples/invoice.yaml

output:
  structured: ./output/

# webhooks:
