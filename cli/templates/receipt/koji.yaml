# Koji configuration
# Docs: https://getkoji.dev/docs/configuration
#
# description: Point-of-sale receipt extraction — merchant, items, tax, totals.

project: {project}

cluster:
  base_port: 9400

pipeline:
  - step: parse
    engine: docling

  - step: extract
    model: openai/gpt-4o-mini
    schemas:
      - ./schemas/receipt.yaml

output:
  structured: ./output/
