# Koji configuration
# Docs: https://getkoji.dev/docs/configuration
#
# description: Government form extraction — names, dates, addresses, checkboxes.

project: {project}

cluster:
  base_port: 9400

pipeline:
  - step: parse
    engine: docling

  - step: extract
    model: openai/gpt-4o-mini
    schemas:
      - ./schemas/form.yaml

output:
  structured: ./output/
