site_name: Koji
site_url: https://docs.getkoji.dev
site_description: Documents in. Structured data out. Self-hosted document processing with schema-driven extraction.
site_author: Koji Contributors

repo_url: https://github.com/getkoji/koji
repo_name: getkoji/koji
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Koji contributors · Apache 2.0

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Instrument Sans
    code: JetBrains Mono
  palette:
    scheme: default
    primary: custom
    accent: custom
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - search.suggest
    - search.highlight
    - search.share
    - toc.follow
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil

extra_css:
  - assets/stylesheets/brand.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/getkoji/koji
    - icon: fontawesome/brands/discord
      link: https://discord.gg/koji
  generator: false

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Schemas: schema-guide.md
  - Configuration: configuration.md
  - Architecture: architecture.md
  - CLI Reference: cli.md
  - API Reference: api-reference.md

hooks:
  - scripts/mkdocs-hooks.py

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Link to this section
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
