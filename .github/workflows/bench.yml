name: Bench

on:
  pull_request:
    branches: [main]
    paths:
      - "services/extract/**"
      - "cli/bench.py"
      - "cli/test_runner.py"
      - "schemas/**"
      - ".github/workflows/bench.yml"
  workflow_dispatch:

jobs:
  bench:
    name: Extraction accuracy
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # Only run if the API key secret is available (forks won't have it)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install koji
        run: pip install -e ".[dev]"

      - name: Checkout corpus
        uses: actions/checkout@v4
        with:
          repository: getkoji/corpus
          path: corpus
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start extract service
        run: |
          python -m uvicorn services.extract.main:app \
            --host 127.0.0.1 --port 9412 &
          timeout 30 bash -c 'until curl -sf http://127.0.0.1:9412/health; do sleep 1; done'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          KOJI_EXTRACT_MODEL: ${{ vars.KOJI_BENCH_MODEL || 'gpt-4o-mini' }}

      - name: Run bench
        run: |
          koji bench \
            --corpus corpus \
            --model "${KOJI_BENCH_MODEL:-gpt-4o-mini}" \
            --output bench-results.json \
            --baseline .github/baselines/bench.json \
            --threshold 1.0
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload bench results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench-results.json
          retention-days: 30

      - name: Comment PR with results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'bench-results.json';
            if (!fs.existsSync(path)) return;

            const results = JSON.parse(fs.readFileSync(path, 'utf8'));
            const baselinePath = '.github/baselines/bench.json';
            let baseline = null;
            if (fs.existsSync(baselinePath)) {
              baseline = JSON.parse(fs.readFileSync(baselinePath, 'utf8'));
            }

            const accuracy = (results.accuracy * 100).toFixed(1);
            const status = results.error_count > 0 ? '⚠️' : '✅';

            let body = `### ${status} Bench Results\n\n`;
            body += `**Overall:** ${results.passed_fields}/${results.total_fields} fields (${accuracy}%) across ${results.total_documents} documents\n\n`;
            body += `| Category | Fields | Accuracy | Delta |\n`;
            body += `|----------|--------|----------|-------|\n`;

            const baselineByCategory = {};
            if (baseline) {
              for (const cat of (baseline.categories || [])) {
                baselineByCategory[cat.category] = cat.accuracy;
              }
            }

            for (const cat of results.categories) {
              const catAccuracy = (cat.accuracy * 100).toFixed(1);
              const baseAcc = baselineByCategory[cat.category];
              let delta = '—';
              if (baseAcc !== undefined) {
                const diff = ((cat.accuracy - baseAcc) * 100).toFixed(1);
                const sign = diff >= 0 ? '+' : '';
                const icon = diff < -1 ? '🔴' : diff > 1 ? '🟢' : '⚪';
                delta = `${icon} ${sign}${diff}pp`;
              } else {
                delta = '🆕 new';
              }
              body += `| ${cat.category} | ${cat.passed}/${cat.fields_checked} | ${catAccuracy}% | ${delta} |\n`;
            }

            body += `\n<sub>Model: ${results.model} · ${results.total_documents} docs · ${(results.elapsed_ms / 1000).toFixed(0)}s</sub>`;

            // Find existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.find(c => c.body.includes('### ') && c.body.includes('Bench Results'));

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
