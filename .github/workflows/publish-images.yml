name: Publish Images

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      build_parse_base:
        description: "Force a rebuild of the parse-base image"
        required: false
        default: "false"

# Cancel in-progress publish runs for the same ref so we don't waste CI time
# when multiple pushes land back-to-back.
concurrency:
  group: publish-images-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ---------------------------------------------------------------------------
  # Parse base image — heavyweight deps (docling, torch, OCR stack).
  #
  # Builds when:
  #   - docker/parse.base.Dockerfile changes on main
  #   - workflow_dispatch with build_parse_base=true
  #   - a release tag is pushed (so tagged releases get a matching base)
  #
  # The application image below always references
  # ghcr.io/getkoji/parse-base:latest, so this job does not block the
  # per-push app rebuilds in the common case.
  # ---------------------------------------------------------------------------
  detect-base-changes:
    name: Detect parse-base changes
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.filter.outputs.parse_base }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check for parse.base.Dockerfile changes
        id: filter
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^docker/parse\.base\.Dockerfile$'; then
            echo "parse_base=true" >> "$GITHUB_OUTPUT"
          else
            echo "parse_base=false" >> "$GITHUB_OUTPUT"
          fi

  publish-parse-base:
    name: Build & Push parse-base
    runs-on: ubuntu-latest
    needs: detect-base-changes
    if: >-
      needs.detect-base-changes.outputs.changed == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.build_parse_base == 'true') ||
      startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract parse-base metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/getkoji/parse-base
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=ref,event=tag
            type=sha,prefix=sha-

      - name: Build and push parse-base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/parse.base.Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=parse-base
          cache-to: type=gha,mode=max,scope=parse-base

  # ---------------------------------------------------------------------------
  # Application images — thin layers that rebuild in seconds.
  #
  # The parse image FROMs ghcr.io/getkoji/parse-base:latest, so we wait for
  # publish-parse-base when it runs. When it is skipped (the common case),
  # we still run the app build against whatever parse-base:latest is
  # already on ghcr.io.
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: [publish-parse-base]
    if: always() && (needs.publish-parse-base.result == 'success' || needs.publish-parse-base.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: server
            dockerfile: docker/server.Dockerfile
            context: .
          - name: parse
            dockerfile: docker/parse.Dockerfile
            context: .
          - name: extract
            dockerfile: docker/extract.Dockerfile
            context: .
          - name: ui
            dockerfile: docker/ui.Dockerfile
            context: .
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/getkoji/${{ matrix.name }}
          tags: |
            # Tag `latest` on pushes to main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            # Tag `latest` on release tags as well
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}
            # Semver tags from v* git tags (e.g. v1.2.3 -> 1.2.3, 1.2, 1)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Raw tag value (e.g. v1.2.3) for traceability
            type=ref,event=tag

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
