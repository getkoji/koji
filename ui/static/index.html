<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Koji</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1a1a1a;
    --border: #262626;
    --text: #e5e5e5;
    --text-muted: #737373;
    --accent: #C4A882;
    --accent-dim: #8B7355;
    --red: #ef4444;
    --yellow: #eab308;
    --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px 24px;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .logo svg {
    width: 32px;
    height: 32px;
  }

  .logo h1 {
    font-size: 20px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }

  .cluster-badge {
    font-size: 12px;
    color: var(--text-muted);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 12px;
    border-radius: 9999px;
  }

  .section {
    margin-bottom: 40px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .services {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .service-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    transition: border-color 0.15s;
  }

  .service-card:hover {
    border-color: #333;
  }

  .service-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .service-name {
    font-weight: 600;
    font-size: 14px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .status-dot.healthy { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.3); }
  .status-dot.unhealthy { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.3); }
  .status-dot.starting { background: var(--yellow); box-shadow: 0 0 8px rgba(234,179,8,0.3); }

  .service-detail {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 4px;
  }

  .service-detail a {
    color: var(--text-muted);
    text-decoration: none;
    border-bottom: 1px dashed var(--border);
  }

  .service-detail a:hover {
    color: var(--text);
    border-color: var(--text-muted);
  }

  .response-time {
    font-size: 11px;
    color: var(--text-muted);
    font-variant-numeric: tabular-nums;
  }

  .response-time.fast { color: #22c55e; }
  .response-time.moderate { color: var(--yellow); }
  .response-time.slow { color: var(--red); }

  .status-dot.unreachable { background: var(--red); box-shadow: 0 0 8px rgba(239,68,68,0.3); }
  .status-dot.connecting { background: #525252; animation: pulse 1.5s ease-in-out infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 1; }
  }

  .pipeline {
    display: flex;
    align-items: center;
    gap: 0;
    flex-wrap: wrap;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .pipeline-step {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
  }

  .pipeline-step .step-detail {
    font-size: 11px;
    color: var(--text-muted);
    font-weight: 400;
  }

  .pipeline-arrow {
    color: var(--text-muted);
    padding: 0 12px;
    font-size: 16px;
  }

  .config-block {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    overflow-x: auto;
  }

  .config-block pre {
    font-family: var(--font);
    font-size: 12px;
    line-height: 1.7;
    color: var(--text-muted);
    white-space: pre;
  }

  .meta {
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: var(--text-muted);
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .loading {
    color: var(--text-muted);
    font-style: italic;
  }

  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--text-muted);
    display: flex;
    justify-content: space-between;
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">
      <svg viewBox="0 0 128 128" width="32" height="32" xmlns="http://www.w3.org/2000/svg">
        <style>.b{fill:none;stroke:#E8E0D8;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}.a{fill:none;stroke:#C4A882;stroke-width:3.5;stroke-linecap:round;stroke-linejoin:round}</style>
        <line class="a" x1="52" y1="112" x2="52" y2="60"/>
        <path class="b" d="M52,60 Q52,48 74,34"/>
        <path class="b" d="M74,34 Q82,28 92,18"/>
        <path class="b" d="M52,60 Q48,48 36,38"/>
        <path class="b" d="M52,78 Q46,70 34,66"/>
        <path class="b" d="M52,60 Q54,44 58,30"/>
        <path class="b" d="M74,34 Q72,26 68,20"/>
      </svg>
      <h1>Koji</h1>
    </div>
    <div class="cluster-badge" id="cluster-name">loading...</div>
  </header>

  <div class="section">
    <div class="meta" id="meta">
      <span class="loading">connecting...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Services</div>
    <div class="services" id="services">
      <div class="service-card">
        <div class="service-header">
          <span class="service-name">connecting...</span>
          <span class="status-dot connecting"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Pipeline</div>
    <div class="pipeline" id="pipeline">
      <span class="loading">loading...</span>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Configuration</div>
    <div class="config-block">
      <pre id="config">loading...</pre>
    </div>
  </div>

  <footer>
    <span>koji v0.1.0</span>
    <span>getkoji.dev</span>
  </footer>
</div>

<script>
  function formatUptime(seconds) {
    const h = Math.floor(seconds / 3600);
    const m = Math.floor((seconds % 3600) / 60);
    const s = seconds % 60;
    if (h > 0) return `${h}h ${m}m ${s}s`;
    if (m > 0) return `${m}m ${s}s`;
    return `${s}s`;
  }

  function statusClass(status) {
    if (status === 'healthy') return 'healthy';
    if (status === 'starting') return 'starting';
    if (status === 'unreachable') return 'unreachable';
    return 'unhealthy';
  }

  function responseTimeClass(ms) {
    if (ms === null || ms === undefined) return '';
    if (ms < 100) return 'fast';
    if (ms < 500) return 'moderate';
    return 'slow';
  }

  function formatResponseTime(ms) {
    if (ms === null || ms === undefined) return '--';
    return ms + 'ms';
  }

  const SERVICE_LABELS = {
    server: 'API Server',
    parse: 'Parse',
    extract: 'Extract',
    ollama: 'Ollama',
  };

  function renderServices(services) {
    const el = document.getElementById('services');
    if (!services || typeof services !== 'object') {
      el.innerHTML = '<div class="service-card"><span class="loading">no services</span></div>';
      return;
    }
    el.innerHTML = Object.entries(services).map(([key, svc]) => {
      const label = SERVICE_LABELS[key] || key;
      const rtClass = responseTimeClass(svc.response_ms);
      return `
        <div class="service-card">
          <div class="service-header">
            <span class="service-name">${label}</span>
            <span class="status-dot ${statusClass(svc.status)}"></span>
          </div>
          <div class="service-detail">
            <a href="${svc.url}" target="_blank">${svc.url}</a>
          </div>
          <div class="service-detail">
            ${svc.status} &middot;
            <span class="response-time ${rtClass}">${formatResponseTime(svc.response_ms)}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function renderPipeline(steps) {
    const el = document.getElementById('pipeline');
    if (!steps || steps.length === 0) {
      el.innerHTML = '<span class="loading">no pipeline configured</span>';
      return;
    }
    el.innerHTML = steps.map((step, i) => {
      const detail = step.engine || step.model || step.strategy || '';
      const arrow = i < steps.length - 1 ? '<span class="pipeline-arrow">&rarr;</span>' : '';
      return `
        <div class="pipeline-step">
          ${step.step}
          ${detail ? `<div class="step-detail">${detail}</div>` : ''}
        </div>
        ${arrow}
      `;
    }).join('');
  }

  async function fetchStatus() {
    try {
      const resp = await fetch('/api/status');
      const data = await resp.json();
      const cluster = data.cluster || {};

      document.getElementById('cluster-name').textContent = cluster.name || '--';
      document.getElementById('meta').innerHTML = `
        <span class="meta-item">project: ${cluster.project || '--'}</span>
        <span class="meta-item">cluster: ${cluster.name || '--'}</span>
        <span class="meta-item">uptime: ${formatUptime(cluster.uptime_seconds || 0)}</span>
      `;

      renderServices(data.services);
      renderPipeline(data.pipeline);
    } catch (e) {
      document.getElementById('meta').innerHTML =
        '<span class="loading">disconnected — retrying...</span>';
    }
  }

  async function fetchConfig() {
    try {
      const resp = await fetch('/api/config');
      const data = await resp.json();
      document.getElementById('config').textContent = JSON.stringify(data, null, 2);
    } catch (e) {
      document.getElementById('config').textContent = '# unable to load config';
    }
  }

  fetchStatus();
  fetchConfig();

  setInterval(fetchStatus, 5000);
  setInterval(fetchConfig, 30000);
</script>
</body>
</html>
